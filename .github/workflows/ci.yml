name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential pkg-config \
            libfreetype6-dev libharfbuzz-dev libx11-dev libxext-dev libxrandr-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxss-dev libxrender-dev \
            libxtst-dev libwayland-dev libegl1-mesa-dev libdbus-1-dev libudev-dev \
            libasound2-dev libpulse-dev libjack-jackd2-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake ninja pkg-config

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          choco install -y cmake ninja git
          refreshenv
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg.exe install freetype harfbuzz

      - name: Configure (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir build
          cd build
          cmake -G Ninja ..

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          mkdir build
          cd build
          cmake -G Ninja .. -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DSDL_SHARED=OFF -DSDL_STATIC=ON

      - name: Build
        run: |
          cd build
          cmake --build .

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
